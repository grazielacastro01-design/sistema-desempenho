<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas - Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .logo-header { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 h-full flex flex-col">

<header class="bg-slate-800 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 flex items-center h-16 gap-4">
    <img src="logo.jpg" alt="Logo" class="logo-header">
    <nav class="ml-auto flex gap-6">
      <a href="index.html" class="text-slate-300 hover:text-white">Início</a>
      <a href="metas.html" class="text-emerald-400 font-medium">Metas</a>
      <a href="relatorios.html" class="text-slate-300 hover:text-white">Relatórios</a>
    </nav>
  </div>
</header>

<main class="flex-grow flex items-center justify-center py-10 px-4">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-100">
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Definir Meta</h2>
      <p class="text-slate-500 text-sm">Vincule um objetivo a um colaborador cadastrado.</p>
    </div>

    <form id="formMetas" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1">Selecionar Colaborador</label>
        <select id="selectColaborador" required class="w-full border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
          <option value="">Carregando lista...</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Descrição da Meta</label>
        <input type="text" id="metaDesc" required placeholder="Ex: Vender 50 unidades" class="w-full border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Prazo Final</label>
        <input type="date" id="prazo" required class="w-full border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:-translate-y-0.5">Salvar Meta</button>
    </form>
  </div>
</main>

<script>
  // Função para carregar os nomes dos colaboradores salvos no LocalStorage
  function popularSelect() {
    const select = document.getElementById('selectColaborador');
    const colaboradores = JSON.parse(localStorage.getItem('colaboradores')) || [];
    
    if (colaboradores.length === 0) {
      select.innerHTML = '<option value="">Nenhum colaborador encontrado</option>';
      return;
    }

    select.innerHTML = '<option value="">Escolha um funcionário</option>';
    colaboradores.forEach(c => {
      select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
    });
  }

  document.getElementById('formMetas').addEventListener('submit', function(e) {
    e.preventDefault();
    Swal.fire({ title: 'Meta Salva!', text: 'O objetivo foi registrado com sucesso.', icon: 'success', confirmButtonColor: '#065f46' });
    this.reset();
  });

  popularSelect();
</script>
</body>
</html>
