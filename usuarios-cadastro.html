<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário | SD Performance</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%232563eb'/><rect x='30' y='55' width='10' height='20' fill='white'/><rect x='45' y='40' width='10' height='35' fill='white'/><rect x='60' y='30' width='10' height='45' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-6 flex justify-between items-center">
        <button onclick="window.location.href='usuarios.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">← Voltar para Lista</button>
        <h1 id="titulo-pagina" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Novo Cadastro de Usuário</h1>
    </nav>

    <main class="max-w-2xl mx-auto p-12">
        <div class="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-100">
            <h2 id="subtitulo-formulario" class="text-2xl font-black text-slate-900 mb-8 italic uppercase tracking-tighter text-center">Dados do Usuário</h2>
            
            <form id="form-usuario" class="space-y-6">
                <input type="hidden" id="usuario_id">

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Nome Completo</label>
                    <input type="text" id="nome" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold" placeholder="Nome do Gestor" required>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Login / E-mail</label>
                    <input type="text" id="login" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold" placeholder="usuario@exemplo.com" required>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Senha de Acesso</label>
                    <input type="password" id="senha" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold" placeholder="••••••••" required>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100">Salvar Usuário</button>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        // Detecta se estamos editando um usuário existente pela URL (?id=X)
        const urlParams = new URLSearchParams(window.location.search);
        const idUsuario = urlParams.get('id');

        // Função executada ao carregar a página para preencher os campos em caso de edição
        async function carregarDadosEdicao() {
            if (idUsuario) {
                // Altera os títulos visuais para o usuário saber que está editando
                document.getElementById('titulo-pagina').innerText = 'Editar Cadastro de Usuário';
                document.getElementById('subtitulo-formulario').innerText = 'Editar Dados do Usuário';
                
                // A senha deixa de ser estritamente obrigatória na edição se você preferir manter a atual
                document.getElementById('senha').removeAttribute('required');
                document.getElementById('senha').placeholder = '(Deixe em branco para não alterar)';

                try {
                    // Puxa a lista e filtra pelo ID específico
                    const res = await fetch(`${API_URL}/usuarios`);
                    const usuarios = await res.json();
                    const usuarioEdicao = usuarios.find(u => u.usuario_id == idUsuario);

                    if (usuarioEdicao) {
                        document.getElementById('nome').value = usuarioEdicao.nome;
                        document.getElementById('login').value = usuarioEdicao.login;
                    }
                } catch (error) {
                    console.error("Erro ao carregar dados do usuário para edição:", error);
                }
            }
        }

        // Lógica de Envio do Formulário (Salvar / Atualizar)
        document.getElementById('form-usuario').onsubmit = async (e) => {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                login: document.getElementById('login').value,
                senha: document.getElementById('senha').value
            };

            try {
                let url = `${API_URL}/usuarios`;
                let metodo = 'POST';

                // Se houver ID na URL, redireciona para a rota PUT de alteração
                if (idUsuario) {
                    url = `${API_URL}/usuarios/${idUsuario}`;
                    metodo = 'PUT';
                }

                const res = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    alert(idUsuario ? 'Usuário atualizado com sucesso!' : 'Usuário cadastrado com sucesso!');
                    window.location.href = 'usuarios.html';
                } else {
                    alert('Erro ao salvar usuário no servidor.');
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert('Erro de conexão com o servidor.');
            }
        };

        // Roda a verificação de edição assim que a janela abrir
        window.onload = carregarDadosEdicao;
    </script>
</body>
</html>
