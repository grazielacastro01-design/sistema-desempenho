<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        form { background: white; padding: 30px; border-radius: 8px; width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        a { font-size: 0.9em; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <form id="formCadastro">
        <h3>Criar Conta</h3>
        <input type="text" id="nome" placeholder="Nome Completo" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Crie uma Senha" required>
        <button type="submit">Finalizar Cadastro</button>
        <br><br>
        <a href="login.html">Voltar para o Login</a>
    </form>

    <script>
        const form = document.getElementById('formCadastro');

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Impede a página de recarregar sozinha

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                // O fetch envia os dados para a rota que vamos criar no server.js
                const response = await fetch('/cadastrar-usuario', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome, email, senha })
                });

                if (response.ok) {
                    alert('Usuário cadastrado com sucesso! 🎉');
                    window.location.href = 'login.html'; // Manda você de volta para o login
                } else {
                    alert('Erro ao cadastrar usuário. Verifique os dados.');
                }
            } catch (error) {
                console.error('Erro na conexão:', error);
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
