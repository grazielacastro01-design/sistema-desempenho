<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário - Sistema de Desempenho</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        form { background: white; padding: 30px; border-radius: 8px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #004085; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #218838; }
        .links { text-align: center; margin-top: 15px; }
        a { font-size: 0.9em; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <form id="formCadastro">
        <h3>Criar Conta de Acesso</h3>
        <input type="text" id="nome" placeholder="Nome Completo" required>
        <input type="email" id="email" placeholder="E-mail Institucional" required>
        <input type="password" id="senha" placeholder="Crie uma Senha" required>
        <button type="submit" id="btnEnviar">Finalizar Cadastro</button>
        <div class="links">
            <a href="login.html">Já tem conta? Voltar para o Login</a>
        </div>
    </form>

    <script>
        const form = document.getElementById('formCadastro');
        const btn = document.getElementById('btnEnviar');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            btn.innerText = "Cadastrando...";
            btn.disabled = true;

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                // Rota completa do seu servidor no Railway
                const urlRailway = 'https://sistema-desempenho-production.up.railway.app/cadastrar-usuario';
                
                const response = await fetch(urlRailway, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                if (response.ok) {
                    alert('Usuário cadastrado com sucesso! 🎉');
                    window.location.href = 'login.html';
                } else {
                    const erro = await response.json();
                    alert('Erro: ' + (erro.message || 'Verifique se o e-mail já existe.'));
                }
            } catch (error) {
                console.error('Erro na conexão:', error);
                alert('Erro ao conectar com o servidor do Railway. Verifique sua conexão.');
            } finally {
                btn.innerText = "Finalizar Cadastro";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
