<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Acesso | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Entrar</h2>
        <p class="text-slate-500 mb-8 font-medium">Acesse sua conta para continuar</p>

        <form id="loginForm" class="space-y-4 text-left">
            <input type="text" id="loginInput" placeholder="Seu usuário" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
            <input type="password" id="senhaInput" placeholder="Sua senha" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
            
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-lg shadow-slate-200">Acessar Painel</button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-sm text-slate-600">Ainda não tem acesso? <a href="cadastrar.html" class="text-blue-600 font-bold hover:underline">Criar conta</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginValue = document.getElementById('loginInput').value;
            const senhaValue = document.getElementById('senhaInput').value;

            try {
                const response = await fetch('https://sistema-desempenho-production.up.railway.app/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: loginValue, senha: senhaValue })
                });

                const data = await response.json();

                if (response.ok) {
                    const userRoot = data.user || data; 
                    const finalId = userRoot.pessoa_id || userRoot.usuario_id || userRoot.id;

                    if (!finalId) throw new Error("ID de usuário não retornado pelo servidor.");

                    // SALVA O NOME PARA AS BOAS-VINDAS
                    localStorage.setItem('nomeUsuario', userRoot.nome || loginValue); 
                    
                    const usuarioParaSalvar = { ...userRoot, pessoa_id: finalId };
                    localStorage.setItem('user', JSON.stringify(usuarioParaSalvar));
                    
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Redirecionando...',
                        icon: 'success',
                        timer: 1000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    Swal.fire('Erro', data.message || 'Usuário ou senha incorretos', 'error');
                }
            } catch (error) {
                console.error("Erro no Login:", error);
                Swal.fire('Erro', 'Não foi possível conectar ao servidor.', 'error');
            }
        });
    </script>
</body>
</html>
