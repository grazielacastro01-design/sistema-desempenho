<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Sine</title>
    <style>
        body { font-family: Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #e9ecef; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #004085; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #004085; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-login:hover { background: #002752; }
        .divider { margin: 20px 0; border-top: 1px solid #ddd; }
        .btn-registrar { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: block; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso</h2>
        <input type="email" id="email" placeholder="E-mail profissional">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        
        <div class="divider">ou</div>
        
        <a href="cadastrar_usuario.html" class="btn-registrar">Cadastrar Novo Usuário</a>
    </div>

    <script>
        function fazerLogin() {
            alert("O login será implementado na próxima etapa do backend!");
        }
    </script>
</body>
</html>
