<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-center">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">Acesso ao Sistema</h2>
        <p class="text-slate-500 mb-8">Insira seus dados para entrar</p>

        <form id="loginForm" class="space-y-4 text-left">
            <div>
                <input type="text" id="loginInput" placeholder="Usuário" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div>
                <input type="password" id="senhaInput" placeholder="Senha" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <div class="text-right">
                <a href="#" onclick="Swal.fire('Aviso', 'Entre em contato com o RH para resetar sua senha.', 'info')" class="text-xs font-semibold text-blue-600 hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Entrar</button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">
            <p class="text-sm text-slate-600">Não tem uma conta? <a href="cadastrar.html" class="text-blue-600 font-bold hover:underline">Criar conta</a></p>
            <a href="index.html" class="inline-block text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition">← Voltar para a apresentação</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('loginInput').value;
            const senha = document.getElementById('senhaInput').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    Swal.fire('Erro', 'Usuário ou senha inválidos', 'error');
                }
            } catch (error) {
                Swal.fire('Erro', 'Falha na conexão', 'error');
            }
        });
    </script>
</body>
</html>
