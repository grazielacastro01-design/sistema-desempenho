<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-200">
        <span class="text-white font-bold text-3xl">S</span>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Acesse o Sistema</h2>
      <p class="text-slate-500 mt-2 text-sm">Insira suas credenciais para continuar.</p>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail Corporativo</label>
        <input type="email" placeholder="exemplo@empresa.com" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" placeholder="••••••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/20 transition transform active:scale-95">
        Entrar no Sistema
      </button>
    </form>

    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
      <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Novo por aqui?</span></div>
    </div>

    <button class="w-full border-2 border-slate-200 text-slate-600 py-3 rounded-lg font-bold hover:bg-slate-50 transition active:scale-95 flex items-center justify-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Cadastrar Usuário
    </button>

    <div class="mt-8 text-center">
      <a href="index.html" class="text-sm text-slate-400 hover:text-blue-600 transition italic">
        ← Voltar para a Apresentação
      </a>
    </div>
  </div>

</body>
</html>
