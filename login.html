<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-100 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-slate-800">Acessar Painel</h2>
      <p class="text-slate-500 mt-2">Bem-vindo de volta!</p>
    </div>

    <form action="dashboard.html" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail Corporativo</label>
        <input type="email" placeholder="nome@empresa.com" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition transform active:scale-95">
        Entrar no Sistema
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="index.html" class="text-sm text-slate-400 hover:text-blue-600 italic">← Voltar para a página inicial</a>
    </div>
  </div>

</body>
</html>
