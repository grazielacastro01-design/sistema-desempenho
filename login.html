<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginValue = document.getElementById('loginInput').value;
        const senhaValue = document.getElementById('senhaInput').value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: loginValue, senha: senhaValue })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } else {
                const errorData = await response.json();
                Swal.fire('Erro', errorData.message || 'Usuário ou senha inválidos', 'error');
            }
        } catch (error) {
            console.error('Erro:', error);
            Swal.fire('Erro', 'Não foi possível conectar ao servidor.', 'error');
        }
    });
</script>
