<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-800">Acessar Sistema</h2>
      <p class="text-slate-500 mt-2 text-sm">Entre com suas credenciais.</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Login</label>
        <input type="text" id="login" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" id="senha" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition active:scale-95">
        Entrar
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-500 mb-4">Ainda não tem acesso?</p>
      <a href="cadastrar.html" class="inline-block w-full bg-slate-100 text-slate-700 py-3 rounded-lg font-bold hover:bg-slate-200 transition border border-slate-200">
        Cadastrar Usuário
      </a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, senha })
        });

        if (response.ok) {
          Swal.fire('Bem-vindo!', 'Login realizado com sucesso!', 'success')
            .then(() => { window.location.href = 'dashboard.html'; }); // Ou para onde o sistema vai após logar
        } else {
          Swal.fire('Erro!', 'Usuário ou senha incorretos.', 'error');
        }
      } catch (error) {
        Swal.fire('Erro!', 'Erro ao conectar com o servidor.', 'error');
      }
    });
  </script>
</body>
</html>
