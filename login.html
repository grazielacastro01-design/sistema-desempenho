<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Desempenho</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #e9ecef; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #004085; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #004085; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login:hover { background: #002752; }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; }
        .divider { margin: 20px 0; border-top: 1px solid #ddd; position: relative; }
        .divider::after { content: "ou"; position: absolute; top: -12px; left: 45%; background: white; padding: 0 10px; color: #888; font-size: 0.9rem; }
        .btn-registrar { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: block; font-size: 0.9rem; box-sizing: border-box; }
        .btn-registrar:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        <input type="email" id="email" placeholder="E-mail profissional" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
        
        <div class="divider"></div>
        
        <a href="cadastrar_usuario.html" class="btn-registrar">Cadastrar Novo Usuário</a>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnEntrar');

            if (!email || !senha) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // Desativa o botão enquanto carrega
            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                // ROTA DO SEU SERVER NO RAILWAY
                const urlRailway = 'https://sistema-desempenho-production.up.railway.app/login';

                const response = await fetch(urlRailway, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await response.json();

                if (response.ok) {
                    alert('Login realizado com sucesso! Bem-vinda, ' + dados.user.nome);
                    
                    // Salva o nome do usuário no navegador para usar depois
                    localStorage.setItem('usuarioLogado', dados.user.nome);

                    // Redireciona para a página principal (ajuste o nome se for outro arquivo)
                    window.location.href = 'index.html'; 
                } else {
                    alert(dados.message || 'E-mail ou senha incorretos.');
                }
            } catch (error) {
                console.error('Erro na conexão:', error);
                alert('Erro ao conectar com o servidor. Verifique se o Railway está online.');
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar";
            }
        }
    </script>
</body>
</html>
