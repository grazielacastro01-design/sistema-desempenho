<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGP</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #f4f7f6; /* Fundo suave */
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
        }

        /* Estilo para a Logo no Cabeçalho do Login */
        .logo-login-container {
            margin-bottom: 25px;
            animation: fadeIn 1s ease-in;
        }
        .logo-login-container img {
            width: 110px; /* Tamanho ajustado da logo flutuante */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Efeito flutuante suave */
        }

        h2 { color: #004085; margin: 10px 0 5px 0; font-size: 1.6rem; }
        .subtitulo { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #004085; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-login:hover { background: #002752; transform: translateY(-2px); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; }

        .divider { margin: 25px 0; border-top: 1px solid #eee; position: relative; }
        .divider::after { 
            content: "ou"; 
            position: absolute; 
            top: -12px; 
            left: 45%; 
            background: white; 
            padding: 0 10px; 
            color: #999; 
            font-size: 0.85rem; 
        }

        .btn-registrar { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            color: #004085; 
            border: 2px solid #004085; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            font-size: 0.9rem; 
            font-weight: bold;
            box-sizing: border-box; 
        }
        .btn-registrar:hover { background: #f0f4f8; }
        
        .btn-voltar {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .btn-voltar:hover { color: #555; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-login-container">
            <img src="image_0.png" alt="Logo Desempenho de Funcionário">
        </div>

        <p class="subtitulo">Sistema de Desempenho de Funcionário</p>
        
        <input type="email" id="email" placeholder="E-mail profissional" required>
        <input type="password" id="senha" placeholder="Senha" required>
        
        <button class="btn-login" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
        
        <div class="divider"></div>
        
        <a href="cadastrar_usuario.html" class="btn-registrar">Criar Nova Conta</a>
        
        <a href="index.html" class="btn-voltar">← Voltar ao início</a>
    </div>

    <script>
        // Mantenha seu script de login idêntico aqui (sem alterações)
        async function fazerLogin() {
            // ... (seu código de login existente) ...
        }
    </script>
</body>
</html>
