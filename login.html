<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | SD Performance</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%232563eb'/><rect x='30' y='55' width='10' height='20' fill='white'/><rect x='45' y='40' width='10' height='35' fill='white'/><rect x='60' y='30' width='10' height='45' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Entrar</h2>
        <p class="text-slate-500 mb-8 font-medium">Acesse sua conta para continuar</p>

        <form id="loginForm" class="space-y-4 text-left">
            <input type="text" id="loginInput" placeholder="Seu usuário" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
            <input type="password" id="senhaInput" placeholder="Sua senha" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
            
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-lg shadow-slate-200">Acessar Painel</button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-sm text-slate-600">Ainda não tem acesso? <a href="cadastrar.html" class="text-blue-600 font-bold hover:underline">Criar conta</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuarioValue = document.getElementById('loginInput').value;
            const senhaValue = document.getElementById('senhaInput').value;

            try {
                const response = await fetch(`${API_URL}/login`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioValue, senha: senhaValue })
                });

                const data = await response.json();

                if (response.ok) {
                    // CORREÇÃO AQUI: Salvando como 'usuario' para bater perfeitamente com o auth.js do seu grupo!
                    localStorage.setItem('nomeUsuario', data.nome || usuarioValue); 
                    localStorage.setItem('usuario', JSON.stringify(data));
                    
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Redirecionando...',
                        icon: 'success',
                        timer: 1000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    Swal.fire('Erro', data.message || 'Usuário ou senha incorretos', 'error');
                }
            } catch (error) {
                console.error("Erro no Login:", error);
                Swal.fire('Erro', 'Não foi possível conectar ao servidor. Verifique o backend no Railway.', 'error');
            }
        });
    </script>
</body>
</html>
