<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Sistema de Desempenho de Funcionário</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #e9ecef; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        h2 { color: #004085; margin-bottom: 5px; }
        .subtitulo { color: #555; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0 0 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #004085; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 15px; }
        .btn-login:hover { background: #002752; }
        .divider { margin: 25px 0; border-top: 1px solid #ddd; position: relative; }
        .divider::after { content: "ou"; position: absolute; top: -12px; left: 45%; background: white; padding: 0 10px; color: #888; font-size: 0.9rem; }
        .btn-registrar { width: 100%; padding: 10px; background: white; color: #004085; border: 2px solid #004085; border-radius: 4px; cursor: pointer; text-decoration: none; display: block; font-size: 0.9rem; box-sizing: border-box; font-weight: 500;}
        .btn-registrar:hover { background: #f0f4f8; }
        .btn-voltar { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.85rem; }
        .btn-voltar:hover { color: #555; }
        
        /* NOVO: Link Esqueceu a Senha */
        .esqueceu-senha { display: block; text-align: right; font-size: 0.8rem; color: #004085; text-decoration: none; margin-top: 5px; }
        .esqueceu-senha:hover { text-decoration: underline; }

        /* NOVO: Estilo da Mensagem de Erro */
        #error-message { color: white; background-color: #dc3545; padding: 10px; border-radius: 4px; font-size: 0.9rem; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso ao SGP</h2>
        <p class="subtitulo">Sistema de Desempenho de Funcionário</p>
        
        <div id="error-message"></div>
        
        <input type="email" id="email" placeholder="E-mail profissional" required>
        <input type="password" id="senha" placeholder="Senha" required>
        
        <a href="#" class="esqueceu-senha">Esqueceu a senha?</a>
        
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        
        <div class="divider"></div>
        
        <a href="cadastrar.html" class="btn-registrar">Criar Nova Conta</a>
        <a href="ladpage.html" class="btn-voltar">← Voltar ao início</a>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('error-message');

            // Limpa mensagem anterior
            errorDiv.style.display = 'none';
            errorDiv.innerHTML = '';

            if (!email || !senha) {
                // Você pode usar o erro em vermelho aqui também se preferir
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                const response = await fetch('https://sistema-desempenho-production.up.railway.app/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await response.json();

                if (response.ok) {
                    alert('Login realizado com sucesso! Bem-vinda, ' + dados.user.nome);
                    localStorage.setItem('usuarioLogado', dados.user.nome);
                    window.location.href = 'painel.html'; 
                } else {
                    // NOVO: Exibe a mensagem de erro específica em vermelho
                    errorDiv.innerHTML = 'E-mail ou senha errados. Por favor tente novamente.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerHTML = 'Erro ao conectar ao servidor. Tente mais tarde.';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
