<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-800">Novo Usuário</h2>
      <p class="text-slate-500 mt-2 text-sm">Crie uma conta para acessar o sistema.</p>
    </div>

    <form id="cadastroForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
        <input type="text" id="nome" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Login (Usuário)</label>
        <input type="text" id="login" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" id="senha" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
      </div>

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg shadow-green-500/20 transition transform active:scale-95">
        Finalizar Cadastro
      </button>
    </form>

    <p id="mensagem" class="mt-4 text-center text-sm font-medium"></p>

    <div class="mt-8 text-center">
      <a href="login.html" class="text-sm text-blue-600 hover:underline transition">
        Já tem uma conta? Faça login
      </a>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('nome').value;
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;
      const mensagem = document.getElementById('mensagem');

      try {
        const response = await fetch('/cadastrar-usuario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, login, senha })
        });

        const data = await response.json();

        if (response.ok) {
          mensagem.className = "mt-4 text-center text-sm font-medium text-green-500";
          mensagem.innerText = "Usuário cadastrado! Redirecionando...";
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          mensagem.className = "mt-4 text-center text-sm font-medium text-red-500";
          mensagem.innerText = data.error || "Erro ao cadastrar.";
        }
      } catch (error) {
        mensagem.innerText = "Erro ao conectar com o servidor.";
      }
    });
  </script>
</body>
</html>
