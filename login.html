<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGP</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #f4f7f6; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
        }

        /* Estilo para a Logo */
        .logo-login-container { margin-bottom: 20px; }
        .logo-login-container img {
            max-width: 180px; /* Um pouco maior para destaque */
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .subtitulo { color: #666; font-size: 0.9rem; margin-bottom: 25px; font-weight: 500; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        
        /* Mensagem de Erro em Vermelho Intenso */
        #error-message {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }

        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #004085; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s; 
            margin-top: 5px;
        }
        .btn-login:hover { background: #002752; }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: -5px;
            margin-bottom: 15px;
            color: #004085;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .forgot-password:hover { text-decoration: underline; }

        .divider { margin: 25px 0; border-top: 1px solid #eee; position: relative; }
        .divider::after { 
            content: "ou"; 
            position: absolute; 
            top: -12px; 
            left: 45%; 
            background: white; 
            padding: 0 10px; 
            color: #999; 
            font-size: 0.85rem; 
        }

        .btn-registrar { 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            color: #004085; 
            border: 2px solid #004085; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            font-size: 0.9rem; 
            font-weight: bold;
            box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-login-container">
            <img src="image_07ac81.jpg" alt="Logo SGP">
        </div>

        <p class="subtitulo">Sistema de Desempenho de Funcionário</p>

        <div id="error-message">E-mail ou senha errados. Por favor tente novamente</div>
        
        <input type="email" id="email" placeholder="E-mail profissional">
        <input type="password" id="senha" placeholder="Senha">
        
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
        
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        
        <div class="divider"></div>
        
        <a href="cadastrar_usuario.html" class="btn-registrar">Criar Nova Conta</a>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('error-message');

            errorDiv.style.display = 'none';

            if(!email || !senha) {
                errorDiv.innerText = "Preencha todos os campos.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('https://sistema-desempenho-production.up.railway.app/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (response.ok) {
                    const dados = await response.json();
                    localStorage.setItem('usuarioLogado', dados.user.nome);
                    window.location.href = 'painel.html'; 
                } else {
                    errorDiv.innerText = "E-mail ou senha errados. Por favor tente novamente";
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = "Erro de conexão com o servidor.";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
