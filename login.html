<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGP</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: #e9ecef; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        
        /* Estilo para a Logo no Login */
        .logo-login { width: 120px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #004085; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #error-message { color: white; background-color: #dc3545; padding: 10px; border-radius: 4px; font-size: 0.9rem; margin-bottom: 15px; display: none; }
        .esqueceu-senha { display: block; text-align: right; font-size: 0.8rem; color: #004085; text-decoration: none; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="logo.jpg" alt="Logo Sistema" class="logo-login">
        
        <div id="error-message"></div>
        
        <input type="email" id="email" placeholder="E-mail profissional">
        <input type="password" id="senha" placeholder="Senha">
        
        <a href="#" class="esqueceu-senha">Esqueceu a senha?</a>
        
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('error-message');

            errorDiv.style.display = 'none';

            try {
                const response = await fetch('https://sistema-desempenho-production.up.railway.app/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (response.ok) {
                    const dados = await response.json();
                    localStorage.setItem('usuarioLogado', dados.user.nome);
                    window.location.href = 'painel.html'; 
                } else {
                    // Mensagem de erro em vermelho como você pediu
                    errorDiv.innerHTML = 'E-mail ou senha errados. Por favor tente novamente.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerHTML = 'Erro de conexão.';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
