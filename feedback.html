<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Feedback</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<h1 class="text-3xl font-bold mb-6">Registrar Feedback</h1>

<form class="bg-white p-6 rounded-lg shadow-md max-w-md">

<label class="block mb-2 font-semibold">Funcionário</label>
<input type="text" class="w-full border p-2 rounded mb-4">

<label class="block mb-2 font-semibold">Feedback</label>
<textarea class="w-full border p-2 rounded mb-4"></textarea>

<button class="bg-purple-500 text-white px-4 py-2 rounded">
Salvar Feedback
</button>

</form>

<a href="index.html" class="block mt-6 text-blue-600">
⬅ Voltar para o sistema
</a>

</body>
</html>
