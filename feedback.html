<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Feedback - Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .logo-header { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 h-full flex flex-col">

<header class="bg-slate-800 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center h-16 gap-4">
    <img src="logo.jpg" alt="Logo" class="logo-header">
    <h1 class="text-xl font-bold">Sistema de Desempenho</h1>
    <nav class="ml-auto hidden md:flex gap-6">
      <a href="index.html" class="text-slate-300 hover:text-white font-medium">Início</a>
      <a href="cadastrar.html" class="text-slate-300 hover:text-white font-medium">Colaboradores</a>
      <a href="metas.html" class="text-slate-300 hover:text-white font-medium">Metas</a>
      <a href="avaliacoes.html" class="text-slate-300 hover:text-white font-medium">Avaliações</a>
      <a href="relatorios.html" class="text-slate-300 hover:text-white font-medium">Relatórios</a>
    </nav>
  </div>
</header>

<main class="flex-grow flex items-center justify-center py-12 px-4">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-100">
    <div class="mb-6">
      <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Registrar Feedback</h2>
      <p class="text-slate-500 text-sm">Documente conversas e pontos de melhoria.</p>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Funcionário</label>
        <select class="w-full border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white">
          <option>Selecione o colaborador...</option>
          <option>Ana Silva</option>
          <option>Carlos Souza</option>
        </select>
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Tipo de Feedback</label>
        <div class="flex gap-4 mt-2">
          <label class="flex items-center text-sm text-slate-600">
            <input type="radio" name="tipo" class="mr-2 text-purple-600"> Positivo
          </label>
          <label class="flex items-center text-sm text-slate-600">
            <input type="radio" name="tipo" class="mr-2 text-purple-600"> Construtivo
          </label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Descrição</label>
        <textarea placeholder="Descreva o que foi conversado..." class="w-full border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none h-32"></textarea>
      </div>

      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform hover:-translate-y-0.5">
        Salvar Registro
      </button>
    </form>
  </div>
</main>

<footer class="bg-slate-800 text-slate-400 py-6 text-center">
  © 2026 Sistema de Desempenho de Funcionário
</footer>

</body>
</html>
