<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>Cadastro | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-800">Novo Usuário</h2>
      <p class="text-slate-500 mt-2 text-sm">Crie uma conta para acessar o sistema.</p>
    </div>

    <form id="cadastroForm" class="space-y-5">
      <input type="text" id="nome" placeholder="Nome Completo" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      <input type="text" id="login" placeholder="Login (Usuário)" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      <input type="password" id="senha" placeholder="Senha" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg transition active:scale-95">
        Finalizar Cadastro
      </button>
    </form>

    <div class="mt-8 text-center pt-6 border-t border-slate-100">
      <a href="index.html" class="text-sm text-blue-600 font-semibold hover:underline">
        Já tem uma conta? Faça login
      </a>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        nome: document.getElementById('nome').value,
        login: document.getElementById('login').value,
        senha: document.getElementById('senha').value
      };

      try {
        const response = await fetch('/cadastrar-usuario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          Swal.fire('Sucesso!', 'Usuário cadastrado!', 'success')
            .then(() => { window.location.href = 'index.html'; });
        } else {
          Swal.fire('Erro!', 'O login pode já estar em uso.', 'error');
        }
      } catch (error) {
        Swal.fire('Erro de Conexão!', 'Verifique se o backend está rodando.', 'error');
      }
    });
  </script>
</body>
</html>
