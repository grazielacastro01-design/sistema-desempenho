<script>
  document.getElementById('formCadastroBD').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Coletando os dados do formulário
    const dadosPessoa = {
      nome: document.getElementById('nome').value,
      cpf: document.getElementById('cpf').value,
      nascimento: document.getElementById('nascimento').value,
      telefone: document.getElementById('telefone').value,
      pessoa_tipo_id: document.getElementById('pessoa_tipo_id').value
    };

    try {
      // --- FORMA CORRETA (Caminho Relativo) ---
      // Isso faz o site falar com o seu próprio servidor no Railway
      const response = await fetch('/cadastrar', { 
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dadosPessoa)
      });

      if (response.ok) {
        Swal.fire({ 
            title: 'Sucesso!', 
            text: 'Dados gravados com sucesso no banco de dados!', 
            icon: 'success',
            confirmButtonColor: '#2563eb'
        });
        this.reset(); // Limpa o formulário após o sucesso
      } else {
        const erroMsg = await response.text();
        throw new Error(erroMsg || 'Erro ao salvar no banco');
      }
    } catch (error) {
      console.error('Erro no envio:', error);
      Swal.fire({
        title: 'Erro de Conexão!',
        text: 'O servidor não respondeu. Verifique os Logs no painel do Railway.',
        icon: 'error'
      });
    }
  });
</script>
