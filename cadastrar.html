<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="font-bold text-2xl">+</span>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Novo Usuário</h2>
      <p class="text-slate-500 mt-2 text-sm">Crie uma conta para acessar o sistema.</p>
    </div>

    <form id="cadastroForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Login (Usuário)</label>
        <input type="text" id="login" placeholder="ex: grazi_admin" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 transition-all">
      </div>

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-lg shadow-green-500/20 transition transform active:scale-95">
        Finalizar Cadastro
      </button>
    </form>

    <div class="mt-8 text-center pt-6 border-t border-slate-100">
      <a href="index.html" class="text-sm text-blue-600 font-semibold hover:text-blue-800 transition">
         Já tem uma conta? Faça login
      </a>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        nome: document.getElementById('nome').value,
        login: document.getElementById('login').value,
        senha: document.getElementById('senha').value
      };

      try {
        const response = await fetch('/cadastrar-usuario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          Swal.fire({
            title: 'Sucesso!',
            text: 'Usuário cadastrado com sucesso!',
            icon: 'success',
            confirmButtonColor: '#16a34a'
          }).then(() => {
            window.location.href = 'index.html';
          });
        } else {
          // Agora ele mostra a mensagem real vinda do server.js (ex: "Este login já existe!")
          Swal.fire('Atenção!', data.error || 'Erro ao processar cadastro.', 'warning');
        }
      } catch (error) {
        Swal.fire('Erro de Conexão!', 'Não foi possível conectar ao servidor. Tente novamente.', 'error');
        console.error('Erro:', error);
      }
    });
  </script>
</body>
</html>
