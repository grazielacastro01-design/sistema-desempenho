<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-center">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">Criar Conta</h2>
        <p class="text-slate-500 mb-8">Cadastre-se para acessar o painel</p>

        <form id="cadastroForm" class="space-y-4 text-left">
            <input type="text" id="nome" placeholder="Nome Completo" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
            <input type="text" id="login" placeholder="Nome de Usuário" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
            <input type="password" id="senha" placeholder="Senha" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition">
            
            <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">Finalizar Cadastro</button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">
            <p class="text-sm text-slate-600">Já possui acesso? <a href="login.html" class="text-emerald-600 font-bold hover:underline">Ir para Login</a></p>
            <a href="index.html" class="inline-block text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition">← Voltar para a apresentação</a>
        </div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const login = document.getElementById('login').value;
            const senha = document.getElementById('senha').value;

            const API_URL = 'https://sistema-desempenho-production.up.railway.app';

            try {
                const response = await fetch(`${API_URL}/cadastrar-usuario`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, login, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire('Sucesso!', 'Conta criada com sucesso!', 'success').then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire('Erro', data.message || 'Não foi possível criar a conta', 'error');
                }
            } catch (error) {
                console.error("Erro no cadastro:", error);
                Swal.fire('Erro', 'Falha na conexão com o servidor', 'error');
            }
        });
    </script>
</body>
</html>
