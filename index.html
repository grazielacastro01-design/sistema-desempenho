<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Desempenho de Funcionário</title>
    <style>
        :root {
            --primary: #004085;
            --overlay: rgba(255, 255, 255, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Hero Section usando seu arquivo fundo.jpg */
        .hero {
            height: 100vh;
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('fundo.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* Logo usando seu arquivo logo.jpg */
        .logo-container img {
            height: 220px;
            width: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        h1 { 
            color: var(--primary); 
            font-size: 2.8rem; 
            margin: 10px 0; 
            text-transform: uppercase;
        }

        p { 
            color: #444; 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            max-width: 700px; 
            font-weight: 500;
        }

        .btn-group { display: flex; gap: 20px; }
        
        .btn {
            padding: 16px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-login { background-color: var(--primary); color: white; border: 2px solid var(--primary); }
        .btn-register { border: 2px solid var(--primary); color: var(--primary); background: transparent; }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        footer { position: absolute; bottom: 20px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo do Sistema">
        </div>

        <h1>Sistema de Desempenho de Funcionário</h1>
        <p>Gestão estratégica de talentos, acompanhamento de metas e avaliações periódicas para o crescimento profissional.</p>
        
        <div class="btn-group">
            <a href="login.html" class="btn btn-login">Acessar Sistema</a>
            <a href="cadastrar_usuario.html" class="btn btn-register">Criar Conta</a>
        </div>

        <footer>© 2026 Projeto Acadêmico - Sistema de Desempenho de Funcionário</footer>
    </section>

</body>
</html>
