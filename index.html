<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Sistema de Gestão de Performance</title>
    <style>
        :root {
            --primary: #004085;
            --white: #ffffff;
            --overlay: rgba(255, 255, 255, 0.9); /* Overlay claro para combinar com o fundo */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; /* Mantém a tela limpa */
        }

        /* Fundo do sistema (Sua imagem image_1.png) */
        .hero {
            height: 100vh;
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('image_1.png'); /* Nome do seu arquivo de fundo aqui */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333; /* Texto escuro sobre fundo claro */
        }

        /* Estilo do título e descrição */
        .hero h1 {
            color: var(--primary);
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 650px;
            margin-bottom: 50px;
            opacity: 0.9;
            color: #555;
            font-weight: 500;
        }

        /* Botões de Direcionamento */
        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 16px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .btn-login {
            background-color: var(--primary);
            color: white;
            border: 2px solid var(--primary);
        }

        .btn-register {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Footer discreto */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Sistema de Desempenho de Funcionário</h1>
        <p>A solução acadêmica completa para avaliação de desempenho, acompanhamento de metas e feedbacks contínuos.</p>
        
        <div class="btn-group">
            <a href="login.html" class="btn btn-login">Acessar Sistema</a>
            <a href="cadastrar_usuario.html" class="btn btn-register">Criar Conta</a>
        </div>

        <footer>© 2026 Projeto Acadêmico - Sistema de Desempenho de Funcionário</footer>
    </section>

</body>
</html>
