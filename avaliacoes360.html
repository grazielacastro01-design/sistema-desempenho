<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação 360 | Sistema de Desempenho</title>
    <link rel="icon" type="image/png" href="https://sistema-desempenho-1x3s.vercel.app/img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-6 flex justify-between items-center shadow-sm">
        <button onclick="window.location.href='dashboard.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">← Voltar</button>
        <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Avaliação de Desempenho por Competências</h1>
        <div class="w-20"></div>
    </nav>

    <main class="max-w-4xl mx-auto p-8">
        <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-200">
            <header class="mb-8">
                <h2 class="text-3xl font-black text-slate-800 italic uppercase tracking-tighter">Avaliação 360°</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Atribua notas de 1 a 5 para cada competência</p>
            </header>
            
            <form id="form360" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Quem está sendo avaliado?</label>
                        <select id="avaliado_id" required class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 transition-all">
                            <option value="">Selecione o colaborador...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Quem é o avaliador?</label>
                        <select id="avaliador_id" required class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 transition-all">
                            <option value="">Selecione quem avalia...</option>
                        </select>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div class="space-y-6">
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-3xl">
                        <div>
                            <h4 class="text-sm font-black text-slate-800 uppercase italic">Proatividade</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Iniciativa e antecipação de problemas</p>
                        </div>
                        <input type="number" id="nota_proatividade" min="1" max="5" value="5" class="w-16 p-3 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-blue-600">
                    </div>

                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-3xl">
                        <div>
                            <h4 class="text-sm font-black text-slate-800 uppercase italic">Comunicação</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Clareza e assertividade na fala/escrita</p>
                        </div>
                        <input type="number" id="nota_comunicacao" min="1" max="5" value="5" class="w-16 p-3 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-blue-600">
                    </div>

                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-3xl">
                        <div>
                            <h4 class="text-sm font-black text-slate-800 uppercase italic">Trabalho em Equipe</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Colaboração e apoio aos colegas</p>
                        </div>
                        <input type="number" id="nota_equipe" min="1" max="5" value="5" class="w-16 p-3 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-blue-600">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Comentários Adicionais</label>
                    <textarea id="comentario" rows="3" placeholder="Pontos fortes e oportunidades de melhoria..." class="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-700"></textarea>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs hover:bg-emerald-500 transition-all shadow-lg active:scale-[0.98]">Finalizar Avaliação 360°</button>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarColaboradores() {
            try {
                const res = await fetch(`${API_URL}/colaboradores`);
                const dados = await res.json();
                const selectAvaliado = document.getElementById('avaliado_id');
                const selectAvaliador = document.getElementById('avaliador_id');
                
                dados.forEach(p => {
                    const html = `<option value="${p.pessoa_id}">${p.nome}</option>`;
                    selectAvaliado.innerHTML += html;
                    selectAvaliador.innerHTML += html;
                });
            } catch (e) { console.error("Erro ao carregar lista"); }
        }

        document.getElementById('form360').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                avaliado_id: document.getElementById('avaliado_id').value,
                avaliador_id: document.getElementById('avaliador_id').value,
                nota_proatividade: document.getElementById('nota_proatividade').value,
                nota_comunicacao: document.getElementById('nota_comunicacao').value,
                nota_equipe: document.getElementById('nota_equipe').value,
                comentario: document.getElementById('comentario').value
            };

            try {
                const res = await fetch(`${API_URL}/avaliacao360`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert("Avaliação 360° enviada com sucesso!");
                    window.location.href = 'dashboard.html';
                }
            } catch (err) { alert("Erro ao salvar avaliação"); }
        });

        window.onload = carregarColaboradores;
    </script>
</body>
</html>
