<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação 360 | Sistema de Desempenho</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%232563eb'/><rect x='30' y='55' width='10' height='20' fill='white'/><rect x='45' y='40' width='10' height='35' fill='white'/><rect x='60' y='30' width='10' height='45' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <nav class="bg-white border-b p-6 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <button onclick="window.location.href='dashboard.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Voltar
        </button>
        <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Avaliação de Desempenho 360°</h1>
        <div class="w-24"></div>
    </nav>

    <main class="max-w-4xl mx-auto p-8">
        <header class="mb-10">
            <h2 class="text-3xl font-black text-slate-800 italic uppercase tracking-tighter">Formulário de Feedback</h2>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">Avalie as competências do colaborador selecionado</p>
        </header>

        <form id="form360" class="space-y-6">
            <!-- Seleção de Colaborador -->
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4">1. Quem você está avaliando?</label>
                <select id="select-colab" class="w-full bg-slate-50 border-none p-4 rounded-xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <option value="">Selecione um colaborador...</option>
                </select>
            </div>

            <!-- Competência 1 -->
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2">2. Comunicação e Trabalho em Equipe</label>
                <p class="text-xs text-slate-500 mb-6 font-semibold">O colaborador compartilha informações de forma clara e ajuda os colegas?</p>
                <div class="grid grid-cols-5 gap-4">
                    <label class="flex flex-col items-center gap-2 cursor-pointer group">
                        <input type="radio" name="c1" value="1" class="w-5 h-5 text-blue-600">
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600 uppercase">Ruim</span>
                    </label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer group">
                        <input type="radio" name="c1" value="2" class="w-5 h-5 text-blue-600">
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600 uppercase">Regular</span>
                    </label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer group">
                        <input type="radio" name="c1" value="3" class="w-5 h-5 text-blue-600">
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600 uppercase">Bom</span>
                    </label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer group">
                        <input type="radio" name="c1" value="4" class="w-5 h-5 text-blue-600" checked>
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600 uppercase">Ótimo</span>
                    </label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer group">
                        <input type="radio" name="c1" value="5" class="w-5 h-5 text-blue-600">
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600 uppercase">Excelente</span>
                    </label>
                </div>
            </div>

            <!-- Competência 2 -->
            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2">3. Proatividade e Iniciativa</label>
                <p class="text-xs text-slate-500 mb-6 font-semibold">Demonstra interesse em resolver problemas antes mesmo de ser solicitado?</p>
                <div class="grid grid-cols-5 gap-4">
                    <!-- Opções simplificadas para o exemplo -->
                    <label class="flex flex-col items-center gap-2 cursor-pointer"><input type="radio" name="c2" value="1"><span class="text-[10px] font-bold text-slate-400 uppercase">1</span></label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer"><input type="radio" name="c2" value="2"><span class="text-[10px] font-bold text-slate-400 uppercase">2</span></label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer"><input type="radio" name="c2" value="3" checked><span class="text-[10px] font-bold text-slate-400 uppercase">3</span></label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer"><input type="radio" name="c2" value="4"><span class="text-[10px] font-bold text-slate-400 uppercase">4</span></label>
                    <label class="flex flex-col items-center gap-2 cursor-pointer"><input type="radio" name="c2" value="5"><span class="text-[10px] font-bold text-slate-400 uppercase">5</span></label>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4">4. Comentários Adicionais</label>
                <textarea class="w-full bg-slate-50 border-none p-4 rounded-xl font-medium text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition h-32" placeholder="Escreva aqui pontos positivos ou de melhoria..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                Finalizar Avaliação 360°
            </button>
        </form>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarColaboradores() {
            try {
                const res = await fetch(`${API_URL}/colaboradores`);
                const dados = await res.json();
                const select = document.getElementById('select-colab');
                
                dados.forEach(colab => {
                    const opt = document.createElement('option');
                    opt.value = colab.id;
                    opt.textContent = colab.nome.toUpperCase();
                    select.appendChild(opt);
                });
            } catch (error) { console.error("Erro:", error); }
        }

        document.getElementById('form360').onsubmit = (e) => {
            e.preventDefault();
            alert('Avaliação enviada com sucesso para o banco de dados!');
            window.location.href = 'dashboard.html';
        };

        window.onload = carregarColaboradores;
    </script>
</body>
</html>
