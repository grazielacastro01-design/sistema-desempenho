<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Avaliação | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-6 flex justify-between items-center shadow-sm">
        <button onclick="window.location.href='dashboard.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">← Voltar ao Início</button>
        <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registrar Nova Avaliação</h1>
        <div class="w-20"></div>
    </nav>

    <main class="max-w-3xl mx-auto p-12">
        <div class="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-100">
            <h2 class="text-2xl font-black text-slate-900 mb-8 italic uppercase tracking-tighter text-center">Ficha de Avaliação</h2>
            
            <form id="form-avaliacao" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Colaborador</label>
                    <!-- ID alterado para select-colaborador para bater com o script -->
                    <select id="select-colaborador" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition font-bold" required>
                        <option value="">Carregando colaboradores...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Feedback / Observação</label>
                    <!-- ID alterado para input-feedback para bater com o script -->
                    <textarea id="input-feedback" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl h-32 outline-none focus:border-blue-500 transition font-bold" placeholder="Digite aqui o desempenho..." required></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100">Salvar Avaliação</button>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        // Função para carregar os nomes no Select
        async function carregarColaboradores() {
            try {
                const res = await fetch(`${API_URL}/colaboradores`);
                const colaboradores = await res.json();
                const select = document.getElementById('select-colaborador');
                
                select.innerHTML = '<option value="">Selecione o funcionário...</option>';
                
                colaboradores.forEach(colab => {
                    const option = document.createElement('option');
                    option.value = colab.pessoa_id || colab.id; // Garante que pega o ID correto
                    option.textContent = colab.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao carregar colaboradores:", error);
                document.getElementById('select-colaborador').innerHTML = '<option value="">Erro ao carregar lista</option>';
            }
        }

        // Script de salvamento que você solicitou
        const form = document.getElementById('form-avaliacao');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const dados = {
                colaborador_id: document.getElementById('select-colaborador').value,
                feedback: document.getElementById('input-feedback').value
            };

            try {
                const response = await fetch(`${API_URL}/avaliar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert('Avaliação salva com sucesso!');
                    window.location.href = 'avaliacoes.html'; // Redireciona após sucesso
                } else {
                    alert('Erro ao salvar. Verifique o servidor.');
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                alert('Erro de conexão com o servidor.');
            }
        };

        window.onload = carregarColaboradores;
    </script>
</body>
</html>
