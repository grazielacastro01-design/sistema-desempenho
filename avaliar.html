<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Avaliar | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <header class="bg-slate-900 p-8 text-center text-white font-black uppercase italic tracking-tighter">
            Registrar Avaliação
        </header>
        <div class="p-10 space-y-8">
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</label>
                <select id="selectColab" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 font-bold text-slate-700 outline-none focus:border-blue-500">
                    <option value="">Carregando...</option>
                </select>
            </div>
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Feedback/Observações</label>
                <textarea id="textoFeedback" rows="6" class="w-full bg-slate-50 border-2 border-slate-100 rounded-[2rem] p-6 font-medium text-slate-700 outline-none focus:border-blue-500 resize-none"></textarea>
            </div>
            <button onclick="enviarAvaliacao()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-6 rounded-2xl font-black uppercase tracking-widest transition-all">
                Salvar Avaliação
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarColaboradores() {
            try {
                const res = await fetch(`${API_URL}/colaboradores`);
                const dados = await res.json();
                const select = document.getElementById('selectColab');
                select.innerHTML = '<option value="">Selecione o funcionário</option>';
                dados.forEach(c => select.innerHTML += `<option value="${c.pessoa_id}">${c.nome}</option>`);
            } catch (e) { console.error(e); }
        }

        async function enviarAvaliacao() {
            const id = document.getElementById('selectColab').value;
            const obs = document.getElementById('textoFeedback').value;
            if (!id || !obs) return Swal.fire('Atenção', 'Preencha tudo!', 'warning');

            try {
                const res = await fetch(`${API_URL}/avaliacao`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ funcionario_id: id, observacao: obs })
                });
                if (res.ok) {
                    await Swal.fire('Sucesso!', 'Avaliação salva!', 'success');
                    window.location.href = 'avaliacoes.html';
                } else {
                    const erro = await res.json();
                    Swal.fire('Erro', erro.error, 'error');
                }
            } catch (e) { Swal.fire('Erro', 'Falha na conexão', 'error'); }
        }
        window.onload = carregarColaboradores;
    </script>
</body>
</html>
