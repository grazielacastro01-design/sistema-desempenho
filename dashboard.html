<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 h-full flex flex-col">
  <header class="bg-slate-900 text-white p-5 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="font-bold text-xl tracking-tight">SD <span class="text-blue-500">Performance</span></h1>
      <button onclick="logout()" class="bg-rose-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-rose-700 transition">Sair</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-10 w-full">
    <h2 id="welcomeMsg" class="text-3xl font-bold text-slate-800 mb-10">Bem-vinda ao Sistema</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <a href="colaboradores.html" class="bg-white p-8 rounded-2xl border border-slate-200 hover:shadow-2xl transition transform hover:-translate-y-1">
        <div class="text-3xl mb-4">👥</div>
        <h3 class="font-bold text-xl mb-2">Colaboradores</h3>
        <p class="text-slate-500">Gerir equipa, cargos e dados profissionais.</p>
      </a>

      <a href="metas.html" class="bg-white p-8 rounded-2xl border border-slate-200 hover:shadow-2xl transition transform hover:-translate-y-1">
        <div class="text-3xl mb-4">🎯</div>
        <h3 class="font-bold text-xl mb-2">Metas OKR</h3>
        <p class="text-slate-500">Definir objetivos e acompanhar KPIs.</p>
      </a>

      <a href="avaliacoes.html" class="bg-white p-8 rounded-2xl border border-slate-200 hover:shadow-2xl transition transform hover:-translate-y-1">
        <div class="text-3xl mb-4">📋</div>
        <h3 class="font-bold text-xl mb-2">Avaliações</h3>
        <p class="text-slate-500">Feedbacks periódicos e ciclos 360°.</p>
      </a>
    </div>
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';
    else document.getElementById('welcomeMsg').innerText = `Bem-vinda, ${user.nome}`;

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
  </script>
</body>
</html>
