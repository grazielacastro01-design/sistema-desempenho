<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen antialiased">

    <nav class="bg-white border-b border-slate-200 px-6 h-20 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13.125C3 12.5037 3.50371 12 4.125 12H6.375C6.99629 12 7.5 12.5037 7.5 13.125V20.25H3V13.125ZM10.5 7.875C10.5 7.25371 11.0037 6.75 11.625 6.75H13.875C14.4963 6.75 15 7.25371 15 7.875V20.25H10.5V7.875ZM18 4.125C18 3.50371 18.5037 3 19.125 3H21.375C21.9963 3 22.5 3.50371 22.5 4.125V20.25H18V4.125Z"/></svg>
            </div>
            <span class="text-xl font-bold text-slate-800 tracking-tight italic uppercase">SD Performance</span>
        </div>
        <button onclick="window.location.href='index.html'" class="text-sm font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg transition">SAIR</button>
    </nav>

    <main class="max-w-5xl mx-auto p-8 pt-12">
        <header class="mb-12">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight italic uppercase">Painel de Gestão</h2>
            <p class="text-slate-500 font-semibold">Olá, Graziela! O que deseja fazer hoje?</p>
        </header>

        <div class="grid grid-cols-2 gap-6 mb-12">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total de Avaliações</p>
                <span id="num-avaliacoes" class="text-5xl font-black text-blue-600">...</span>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Colaboradores</p>
                <span id="num-colaboradores" class="text-5xl font-black text-slate-900">...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="window.location.href='avaliar.html'" class="group bg-slate-900 text-white p-10 rounded-[2.5rem] text-left hover:bg-slate-800 transition-all shadow-xl">
                <h3 class="text-2xl font-black italic uppercase mb-2 group-hover:text-blue-400">Nova Avaliação</h3>
                <p class="text-slate-400 text-sm">Registrar desempenho de um colaborador agora.</p>
            </button>

            <button onclick="window.location.href='avaliacoes.html'" class="group bg-blue-600 text-white p-10 rounded-[2.5rem] text-left hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">
                <h3 class="text-2xl font-black italic uppercase mb-2 group-hover:text-blue-100">Ver Histórico</h3>
                <p class="text-blue-100 text-sm">Consultar, editar ou excluir registros anteriores.</p>
            </button>
        </div>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';
        async function carregar() {
            try {
                const res = await fetch(`${API_URL}/dashboard-resumo`);
                const dados = await res.json();
                document.getElementById('num-avaliacoes').innerText = dados.avaliacoes || 0;
                document.getElementById('num-colaboradores').innerText = dados.colaboradores || 0;
            } catch (e) { console.error("Erro ao carregar"); }
        }
        window.onload = carregar;
    </script>
</body>
</html>
