<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800">SD Performance</h1>
            <div class="flex items-center gap-4">
                <span id="nomeUsuarioNav" class="text-sm font-medium text-slate-600">Carregando...</span>
                <button onclick="logout()" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold hover:bg-red-100 transition">Sair</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-6">
            <h2 id="saudacao" class="text-2xl font-extrabold text-slate-900">Olá!</h2>
            <p class="text-slate-500 font-medium">Bem-vindo ao seu painel de desempenho.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Cargo</p>
                <p id="cargoColaborador" class="text-lg font-bold text-slate-800">---</p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">ID do Usuário</p>
                <p id="idColaborador" class="text-lg font-bold text-slate-800">---</p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold">Ativo</span>
            </div>
        </div>
    </main>

    <script>
        async function carregarDashboard() {
            const userStr = localStorage.getItem('user');
            
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);

            try {
                // FETCH ATUALIZADO: Apontando diretamente para o servidor Railway que está ONLINE
                const response = await fetch(`https://sistema-desempenho-production.up.railway.app/colaborador/${user.pessoa_id}`);
                
                if (!response.ok) throw new Error('Erro ao buscar dados no servidor');

                const dados = await response.json();

                // Preenche as informações na tela com os dados vindos do banco
                document.getElementById('nomeUsuarioNav').innerText = dados.nome || 'Usuário';
                document.getElementById('saudacao').innerText = `Olá, ${dados.nome || 'Colaborador'}!`;
                document.getElementById('cargoColaborador').innerText = dados.cargo || 'Não informado';
                document.getElementById('idColaborador').innerText = `#${dados.pessoa_id}`;

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                Swal.fire({
                    title: 'Erro',
                    text: 'Não foi possível carregar seus dados do servidor Railway.',
                    icon: 'error'
                });
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Inicia a carga dos dados
        carregarDashboard();
    </script>
</body>
</html>
