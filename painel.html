<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vinda - Sistema de Desempenho</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .bg-image {
            /* Usando a sua imagem de fundo */
            background-image: url('image_0671ca.jpg'); 
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-entrar {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: #004085;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-image">
        <a href="login.html" class="btn-entrar">ENTRAR NO SISTEMA</a>
    </div>
</body>
</html>
