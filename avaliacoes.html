<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-6 flex justify-between items-center sticky top-0 z-50">
        <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-2 text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">
            ← Voltar ao Início
        </button>
        <h1 class="text-xs font-black text-slate-400 uppercase tracking-widest italic">Histórico de Performance</h1>
    </nav>

    <main class="max-w-6xl mx-auto p-12">
        <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Colaborador</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Data</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </div>
    </main>
</body>
</html>
