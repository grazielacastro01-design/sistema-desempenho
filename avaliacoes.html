<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100 shadow-sm">
        <h2 class="text-xl font-black text-slate-800 uppercase italic tracking-tighter">Histórico de Avaliações</h2>
        <button onclick="window.location.href='avaliar.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-bold uppercase text-xs transition-all">
            Nova Avaliação
        </button>
    </header>

    <div class="p-8">
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Observação</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use a URL do seu backend no Railway
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarHistorico() {
            try {
                // Rota que criamos no index.js para listar avaliações
                const res = await fetch(`${API_URL}/listar-avaliacoes`);
                const dados = await res.json();
                
                const tbody = document.getElementById('tabela-corpo');
                tbody.innerHTML = ''; // Limpa a tabela antes de carregar

                if (dados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-400">Nenhuma avaliação encontrada.</td></tr>';
                    return;
                }

                dados.forEach(a => {
                    const dataFormatada = new Date(a.data).toLocaleDateString('pt-BR');
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                            <td class="p-6 text-sm text-slate-500 font-medium">${dataFormatada}</td>
                            <td class="p-6 text-sm font-black text-slate-800">${a.nome_colaborador}</td>
                            <td class="p-6 text-sm text-slate-600 leading-relaxed">${a.observacao}</td>
                        </tr>`;
                });
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }
        }

        // Executa a função assim que a página abre
        window.onload = carregarHistorico;
    </script>
</body>
</html>
