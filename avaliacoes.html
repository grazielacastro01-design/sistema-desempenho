<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Avaliações | SD Performance</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%232563eb'/><rect x='30' y='55' width='10' height='20' fill='white'/><rect x='45' y='40' width='10' height='35' fill='white'/><rect x='60' y='30' width='10' height='45' fill='white'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <nav class="bg-white border-b border-slate-200 p-6 flex justify-between items-center">
        <button onclick="window.location.href='dashboard.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">← Voltar</button>
        <h1 class="text-xs font-black text-slate-400 uppercase tracking-widest">Histórico de Avaliações</h1>
        <button onclick="gerarPDF()" class="bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-600 transition">Gerar Relatório PDF</button>
    </nav>

    <div id="relatorio-secao" class="p-8 max-w-7xl mx-auto">
        <div class="mb-6">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase">Relatório de Feedbacks</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">SD PERFORMANCE - Gestão de Talentos</p>
        </div>
        <div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Observação</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
    const API_URL = 'https://sistema-desempenho-production.up.railway.app';

    async function carregar() {
        try {
            // Ajustado para bater com a rota do seu servidor
            const res = await fetch(`${API_URL}/avaliacoes`); 
            const dados = await res.json();
            
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = '';
            
            dados.forEach(a => {
                // Usamos a data que já vem formatada do banco ou formatamos aqui
                const dataF = a.data; 
                
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-6 text-sm text-slate-500 font-bold">${dataF}</td>
                        <td class="p-6 text-sm font-black text-slate-800 uppercase">${a.colaborador}</td>
                        <td class="p-6 text-sm text-slate-600 font-medium">${a.observacao}</td>
                    </tr>`;
            });
        } catch (error) { 
            console.error("Erro ao carregar:", error);
            Swal.fire('Erro', 'Não foi possível carregar o histórico.', 'error');
        }
    }

    function gerarPDF() {
        const elemento = document.getElementById('relatorio-secao');
        const opt = {
            margin: 10,
            filename: 'Relatorio_Avaliacoes.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(elemento).save();
    }

    window.onload = carregar;
</script>
           
</body>
</html>
