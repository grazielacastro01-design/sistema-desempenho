<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white p-6 flex justify-between items-center border-b shadow-sm">
        <h2 class="text-xl font-black text-slate-800 uppercase italic">Histórico de Avaliações</h2>
        <button onclick="window.location.href='dashboard.html'" class="bg-slate-100 text-slate-600 px-6 py-2 rounded-xl font-bold uppercase text-xs">Voltar</button>
    </header>

    <div class="p-8">
        <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Data</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Colaborador</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Observação</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarHistorico() {
            const res = await fetch(`${API_URL}/listar-avaliacoes`);
            const dados = await res.json();
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = ''; 

            dados.forEach(a => {
                const dataF = new Date(a.data).toLocaleDateString('pt-BR');
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition-all">
                        <td class="p-6 text-sm text-slate-500">${dataF}</td>
                        <td class="p-6 text-sm font-black text-slate-800">${a.nome_colaborador}</td>
                        <td class="p-6 text-sm text-slate-600">${a.observacao}</td>
                        <td class="p-6 text-right space-x-3">
                            <button onclick="editar(${a.avaliacao_id}, '${a.observacao}')" class="text-blue-500 font-bold uppercase text-[10px]">Editar</button>
                            <button onclick="excluir(${a.avaliacao_id})" class="text-red-500 font-bold uppercase text-[10px]">Excluir</button>
                        </td>
                    </tr>`;
            });
        }

        async function editar(id, texto) {
            const { value: novoTexto } = await Swal.fire({
                title: 'Editar Avaliação',
                input: 'textarea',
                inputValue: texto,
                showCancelButton: true,
                confirmButtonText: 'Salvar',
                confirmButtonColor: '#2563eb'
            });

            if (novoTexto) {
                const res = await fetch(`${API_URL}/avaliacao/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ observacao: novoTexto })
                });
                if (res.ok) {
                    Swal.fire('Sucesso!', 'Avaliação atualizada.', 'success');
                    carregarHistorico();
                }
            }
        }

        async function excluir(id) {
            const result = await Swal.fire({
                title: 'Tem certeza?',
                text: "Você não poderá reverter isso!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir!'
            });

            if (result.isConfirmed) {
                const res = await fetch(`${API_URL}/avaliacao/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    Swal.fire('Excluído!', '', 'success');
                    carregarHistorico();
                }
            }
        }

        window.onload = carregarHistorico;
    </script>
</body>
</html>
