<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100">
        <h2 class="text-xl font-black text-slate-800 uppercase italic">Histórico de Avaliações</h2>
        <button onclick="window.location.href='avaliar.html'" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold uppercase text-xs">Nova Avaliação</button>
    </header>
    <div class="p-8">
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Data</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Colaborador</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Observação</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>
    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';
        async function carregar() {
            const res = await fetch(`${API_URL}/listar-avaliacoes`);
            const dados = await res.json();
            const tbody = document.getElementById('tabela');
            dados.forEach(a => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-50">
                        <td class="p-6 text-sm text-slate-500">${new Date(a.data).toLocaleDateString('pt-BR')}</td>
                        <td class="p-6 text-sm font-black text-slate-800">${a.nome_colaborador}</td>
                        <td class="p-6 text-sm text-slate-600">${a.observacao}</td>
                    </tr>`;
            });
        }
        window.onload = carregar;
    </script>
</body>
</html>
