<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Avaliações | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <main class="flex-1 flex flex-col">
        <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Histórico de Avaliações</h2>
            </div>
            <button onclick="window.location.href='avaliar.html'" class="bg-red-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-red-700 transition shadow-lg shadow-red-200">
                <i class="fas fa-star mr-2"></i> Nova Avaliação
            </button>
        </header>

        <section class="p-8">
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Feedback / Observação</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAvaliacoes">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarHistorico() {
            try {
                // Precisaremos criar essa rota no backend para listar as avaliações
                const response = await fetch(`${API_URL}/listar-avaliacoes`);
                const avaliacoes = await response.json();
                const tbody = document.getElementById('tabelaAvaliacoes');
                tbody.innerHTML = '';

                avaliacoes.forEach(av => {
                    // Formata a data para o padrão brasileiro
                    const dataFormatada = new Date(av.data).toLocaleDateString('pt-BR');
                    
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
                            <td class="p-6 text-sm font-bold text-slate-500">${dataFormatada}</td>
                            <td class="p-6 text-sm font-black text-slate-800">${av.nome_colaborador}</td>
                            <td class="p-6 text-sm text-slate-600 italic">"${av.observacao}"</td>
                            <td class="p-6 text-center">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase bg-green-100 text-green-700">
                                    Concluída
                                </span>
                            </td>
                        </tr>`;
                });
            } catch (e) {
                console.error("Erro ao carregar histórico:", e);
                document.getElementById('tabelaAvaliacoes').innerHTML = `
                    <tr><td colspan="4" class="p-10 text-center text-slate-400 font-bold">Nenhuma avaliação encontrada.</td></tr>
                `;
            }
        }

        window.onload = carregarHistorico;
    </script>
</body>
</html>
