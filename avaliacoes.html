<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <header class="bg-white p-6 flex justify-between items-center border-b shadow-sm sticky top-0 z-50">
        <h2 class="text-xl font-black text-slate-800 uppercase italic">Histórico de Avaliações</h2>
        <button onclick="window.location.href='dashboard.html'" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black uppercase text-[10px] hover:bg-blue-700 transition">← Voltar ao Início</button>
    </header>

    <div class="p-8 max-w-7xl mx-auto">
        <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Observação</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregar() {
            try {
                const res = await fetch(`${API_URL}/listar-avaliacoes`);
                const dados = await res.json();
                const tbody = document.getElementById('tabela-corpo');
                tbody.innerHTML = '';
                dados.forEach(a => {
                    const dataF = new Date(a.data).toLocaleDateString('pt-BR');
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-6 text-sm text-slate-500 font-bold">${dataF}</td>
                            <td class="p-6 text-sm font-black text-slate-800 uppercase tracking-tighter">${a.nome_colaborador}</td>
                            <td class="p-6 text-sm text-slate-600 italic">${a.observacao}</td>
                            <td class="p-6 text-right space-x-4">
                                <button onclick="editar(${a.avaliacao_id}, '${a.observacao}')" class="text-blue-500 font-black uppercase text-[10px] hover:underline">Editar</button>
                                <button onclick="excluir(${a.avaliacao_id})" class="text-red-500 font-black uppercase text-[10px] hover:underline">Excluir</button>
                            </td>
                        </tr>`;
                });
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        async function editar(id, texto) {
            const { value: novo } = await Swal.fire({ 
                title: 'Editar Observação', 
                input: 'textarea', 
                inputValue: texto, 
                showCancelButton: true,
                confirmButtonColor: '#2563eb'
            });
            if (novo) {
                await fetch(`${API_URL}/avaliacao/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ observacao: novo })
                });
                carregar();
            }
        }

        async function excluir(id) {
            const result = await Swal.fire({
                title: 'Tem certeza?',
                text: "Você não poderá reverter isso!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sim, excluir!'
            });
            if (result.isConfirmed) {
                await fetch(`${API_URL}/avaliacao/${id}`, { method: 'DELETE' });
                carregar();
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
