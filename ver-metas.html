<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-slate-50 flex flex-col">

  <header class="bg-slate-900 text-white shadow-md p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-emerald-500 rounded flex items-center justify-center font-bold italic">M</div>
        <h1 class="text-xl font-bold italic">Gestão de Metas OKR</h1>
      </div>
      <a href="dashboard.html" class="text-slate-400 hover:text-white text-sm font-semibold">← Voltar ao Painel</a>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl border-t-4 border-emerald-500">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Nova Meta / KPI</h2>
        <p class="text-slate-500">Defina objetivos claros e mensuráveis para o ciclo atual.</p>
      </div>

      <form id="form-metas" class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wider">Vincular ao Colaborador</label>
          <select id="colaborador-select" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition cursor-pointer" required>
            <option value="">Carregando lista de colaboradores...</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wider">Título do Objetivo</label>
          <input type="text" id="titulo" placeholder="Ex: Aumentar produtividade em 20%" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wider">Data Limite (Deadline)</label>
            <input type="date" id="prazo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wider">Tipo de Meta</label>
            <select id="tipo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition cursor-pointer">
              <option value="okr">OKR (Objetivo Crítico)</option>
              <option value="kpi">KPI (Indicador de Performance)</option>
              <option value="pdi">PDI (Desenvolvimento Pessoal)</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wider">Descrição dos Resultados Esperados</label>
          <textarea id="descricao" rows="4" placeholder="Descreva os passos para atingir essa meta..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition"></textarea>
        </div>

        <div class="mt-4">
          <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-500/20 transition transform active:scale-95">
            Lançar Meta no Sistema
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 py-6 text-center text-slate-400 text-xs font-bold tracking-widest uppercase">
    © 2026 SISTEMA DE DESEMPENHO PROFISSIONAL
  </footer>

  <script>
    const API_URL = 'https://sistema-desempenho-production.up.railway.app';

    async function carregarColaboradores() {
      try {
        const res = await fetch(`${API_URL}/colaboradores`);
        const colaboradores = await res.json();
        const select = document.getElementById('colaborador-select');
        
        select.innerHTML = '<option value="">Selecione um colaborador da lista...</option>';
        
        colaboradores.forEach(colab => {
          const option = document.createElement('option');
          option.value = colab.pessoa_id;
          option.textContent = colab.nome;
          select.appendChild(option);
        });
      } catch (error) {
        console.error("Erro ao carregar colaboradores:", error);
      }
    }

    document.getElementById('form-metas').onsubmit = async (e) => {
      e.preventDefault();
      
      const dados = {
        pessoa_id: document.getElementById('colaborador-select').value,
        titulo: document.getElementById('titulo').value,
        prazo: document.getElementById('prazo').value,
        descricao: document.getElementById('descricao').value
      };

      try {
        const res = await fetch(`${API_URL}/metas`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        if (res.ok) {
          alert('Meta lançada com sucesso!');
          window.location.href = 'dashboard.html';
        } else {
          alert('Erro ao salvar meta no banco.');
        }
      } catch (error) {
        alert('Erro de conexão com o servidor.');
      }
    };

    window.onload = carregarColaboradores;
  </script>
</body>
</html>
