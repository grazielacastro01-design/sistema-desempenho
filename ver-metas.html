<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Metas | SD Performance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='20' fill='%232563eb'/><rect x='30' y='55' width='10' height='20' fill='white'/><rect x='45' y='40' width='10' height='35' fill='white'/><rect x='60' y='30' width='10' height='45' fill='white'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @media print { .no-print { display: none; } }
  </style>
</head>
<body class="h-full bg-slate-50 flex flex-col">
  
  <header class="bg-slate-900 text-white shadow-md p-6 no-print">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-4">
        <button onclick="window.location.href='dashboard.html'" class="bg-white/10 p-2 rounded-lg hover:bg-white/20 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Gestão de Metas OKR</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Acompanhamento de Performance</p>
        </div>
      </div>
      <div class="flex gap-3">
          <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-700 transition">Imprimir</button>
          <button onclick="alert('Funcionalidade de nova meta em breve!')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-emerald-600 transition">Nova Meta +</button>
      </div>
    </div>
  </header>

  <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Descrição da Meta</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Colaborador</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Prazo</th>
                </tr>
            </thead>
            <tbody id="tabela-metas" class="divide-y divide-slate-100">
                <!-- Os dados virão do Banco de Dados -->
                <tr>
                    <td colspan="4" class="p-10 text-center text-slate-400 font-medium italic">Carregando metas do sistema...</td>
                </tr>
            </tbody>
        </table>
    </div>
  </main>

  <script>
    const API_URL = 'https://sistema-desempenho-production.up.railway.app';

    async function carregarMetas() {
        try {
            // Rota que já existe no seu index.js para listar metas
            const res = await fetch(`${API_URL}/dashboard-resumo`); 
            // Nota: Se você tiver uma rota específica /metas, mude o link acima.
            
            const resMetas = await fetch(`${API_URL}/colaboradores`); // Usando colaboradores como exemplo para preencher a tela
            const colaboradores = await resMetas.json();
            
            const tbody = document.getElementById('tabela-metas');
            tbody.innerHTML = '';

            if (colaboradores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">Nenhuma meta encontrada.</td></tr>';
                return;
            }

            colaboradores.forEach((colab, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-6 text-sm text-slate-400 font-bold">#00${index + 1}</td>
                        <td class="p-6">
                            <p class="text-sm font-black text-slate-800 uppercase tracking-tight">Aumentar produtividade em 15%</p>
                            <p class="text-[10px] text-emerald-600 font-bold uppercase">Meta Estratégica</p>
                        </td>
                        <td class="p-6 text-sm font-bold text-slate-600">${colab.nome}</td>
                        <td class="p-6 text-sm text-slate-500 font-medium italic">31/12/2026</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Erro ao carregar metas:", error);
            document.getElementById('tabela-metas').innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-400">Erro ao conectar com o servidor.</td></tr>';
        }
    }

    window.onload = carregarMetas;
  </script>
</body>
</html>
