<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Metas | SD PERFORMANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b p-6 flex justify-between items-center shadow-sm">
        <button onclick="window.location.href='dashboard.html'" class="text-blue-600 font-black text-xs uppercase tracking-widest hover:underline">← Voltar ao Painel</button>
        <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Painel de Acompanhamento OKR</h1>
        <button onclick="window.location.href='metas.html'" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-emerald-600 transition">Nova Meta +</button>
    </nav>

    <main class="max-w-6xl mx-auto p-8 md:p-12">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-slate-800 italic uppercase tracking-tighter">Metas do Ciclo</h2>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-2">Acompanhamento de objetivos por colaborador</p>
        </header>

        <div id="lista-metas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-slate-400 font-bold uppercase text-xs animate-pulse">Buscando metas no servidor...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarMetas() {
            try {
                const res = await fetch(`${API_URL}/listar-metas`);
                const metas = await res.json();
                const container = document.getElementById('lista-metas');
                
                if (metas.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-slate-400 font-black uppercase text-sm tracking-widest">Nenhuma meta encontrada no banco.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = ''; 

                metas.forEach(meta => {
                    const dataFormatada = new Date(meta.prazo).toLocaleDateString('pt-BR');
                    
                    container.innerHTML += `
                        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200 hover:shadow-xl transition-shadow group relative">
                            <button onclick="apagarMeta(${meta.meta_id})" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>

                            <div class="flex justify-between items-start mb-6">
                                <span class="bg-emerald-100 text-emerald-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Ativa</span>
                                <span class="text-[10px] font-bold text-slate-300 italic">#${meta.meta_id}</span>
                            </div>
                            
                            <p class="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-2">${meta.nome_colaborador}</p>
                            <h3 class="text-xl font-black text-slate-900 mb-4 uppercase italic tracking-tighter leading-tight group-hover:text-blue-600 transition-colors">${meta.titulo}</h3>
                            
                            <div class="bg-slate-50 p-4 rounded-2xl mb-6">
                                <p class="text-slate-500 text-xs font-medium leading-relaxed">${meta.descricao || 'Sem descrição detalhada.'}</p>
                            </div>

                            <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Prazo Final</p>
                                    <p class="text-xs font-bold text-slate-700">${dataFormatada}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Status</p>
                                    <p class="text-xs font-bold text-orange-500">Em progresso</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar metas:", error);
                document.getElementById('lista-metas').innerHTML = '<p class="text-red-500 font-bold uppercase text-xs">Erro ao conectar com o servidor.</p>';
            }
        }

        // FUNÇÃO PARA CHAMAR A EXCLUSÃO
        async function apagarMeta(id) {
            if (confirm("Deseja mesmo excluir esta meta? Esta ação não pode ser desfeita.")) {
                try {
                    const res = await fetch(`${API_URL}/deletar-meta/${id}`, {
                        method: 'DELETE'
                    });

                    if (res.ok) {
                        alert("Meta apagada!");
                        location.reload(); 
                    } else {
                        alert("Não foi possível apagar a meta.");
                    }
                } catch (error) {
                    console.error("Erro:", error);
                    alert("Erro de conexão com o servidor.");
                }
            }
        }

        window.onload = carregarMetas;
    </script>
</body>
</html>
