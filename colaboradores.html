<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex min-h-screen font-sans">

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100">
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Gestão de Colaboradores</h2>
            <div class="flex items-center gap-4">
                <button onclick="gerarPDF()" class="text-slate-500 hover:text-blue-600 font-bold text-xs uppercase tracking-widest transition">
                    <i class="fas fa-file-pdf mr-1"></i> Exportar PDF
                </button>
                <button onclick="abrirModalCadastro()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    <i class="fas fa-plus mr-2"></i> Novo Cadastro
                </button>
            </div>
        </header>

        <section class="p-8 space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nome Completo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarColaboradores() {
            try {
                const response = await fetch(`${API_URL}/colaboradores`);
                if (!response.ok) throw new Error("Erro ao buscar");
                
                const colaboradores = await response.json();
                const tbody = document.getElementById('tabelaCorpo');
                tbody.innerHTML = '';

                colaboradores.forEach(colab => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-all">
                            <td class="p-6 text-sm font-bold text-slate-400">#${colab.pessoa_id}</td>
                            <td class="p-6 text-sm font-black text-slate-800">${colab.nome}</td>
                            <td class="p-6 text-center">
                                <button class="text-slate-400 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
            } catch (error) {
                console.error("Erro ao listar:", error);
            }
        }

        function abrirModalCadastro() {
            Swal.fire({
                title: 'Novo Colaborador',
                input: 'text',
                inputLabel: 'Nome Completo',
                showCancelButton: true,
                confirmButtonText: 'Salvar',
                confirmButtonColor: '#2563eb',
                preConfirm: (value) => {
                    if (!value) return Swal.showValidationMessage('O nome é obrigatório');
                    return value;
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`${API_URL}/colaborador`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ nome: result.value })
                        });

                        if (response.ok) {
                            Swal.fire({ title: 'Sucesso!', icon: 'success', timer: 1500, showConfirmButton: false });
                            carregarColaboradores();
                        } else {
                            throw new Error();
                        }
                    } catch (error) {
                        Swal.fire('Erro', 'O banco de dados não permitiu o cadastro. Tente novamente.', 'error');
                    }
                }
            });
        }

        function gerarPDF() {
            Swal.fire('Aviso', 'Função de PDF em breve.', 'info');
        }

        window.onload = carregarColaboradores;
    </script>
</body>
</html>
