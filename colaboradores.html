// Dentro da função carregarColaboradores(), mude a linha da tabela para:
dados.forEach(pessoa => {
    corpoTabela.innerHTML += `
        <tr class="hover:bg-slate-50 transition-colors group">
            <td class="px-6 py-4">
                <div class="font-bold text-slate-800">${pessoa.nome}</div>
                <div class="text-xs text-slate-500">${pessoa.cargo} | ${pessoa.area}</div>
            </td>
            <td class="px-6 py-4 text-sm text-slate-600">${pessoa.cpf}</td>
            <td class="px-6 py-4 text-sm text-blue-600 font-medium">
                ${pessoa.gestor_nome || 'Diretoria'}
            </td>
            <td class="px-6 py-4 text-right">
                <button onclick="gerarPDI(${pessoa.id})" class="text-xs font-bold uppercase text-emerald-600 mr-4">PDI</button>
                <button class="text-xs font-bold uppercase text-blue-600">Editar</button>
            </td>
        </tr>
    `;
});
