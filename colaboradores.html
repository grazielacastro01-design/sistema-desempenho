<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores - Sistema de Desempenho de Funcionário</title>
    <style>
        :root { --primary: #004085; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-pagi { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        h2 { color: var(--primary); margin: 0; }
        
        .btn-voltar { text-decoration: none; color: #666; font-weight: bold; font-size: 0.9rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: var(--primary); text-transform: uppercase; font-size: 0.85rem; }
        
        .loading { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-pagi">
        <div>
            <a href="painel.html" class="btn-voltar">← Voltar ao Painel</a>
            <h2>Gestão de Colaboradores</h2>
        </div>
        <button class="btn-add" onclick="alert('Funcionalidade de cadastro em breve!')">+ Novo Colaborador</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome Completo</th>
                <th>CPF</th>
                <th>Data de Nascimento</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaCorpo">
            <tr>
                <td colspan="5" class="loading">Carregando colaboradores...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Função para buscar os dados do seu banco no Railway
    async function carregarColaboradores() {
        const corpoTabela = document.getElementById('tabelaCorpo');
        
        try {
            // Rota que criamos no seu server.js
            const response = await fetch('https://sistema-desempenho-production.up.railway.app/colaboradores');
            const colaboradores = await response.json();

            if (colaboradores.length === 0) {
                corpoTabela.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum colaborador encontrado.</td></tr>';
                return;
            }

            corpoTabela.innerHTML = ""; // Limpa o "Carregando..."

            colaboradores.forEach(pessoa => {
                const dataFormatada = new Date(pessoa.nascimento).toLocaleDateString('pt-BR');
                
                corpoTabela.innerHTML += `
                    <tr>
                        <td><strong>#${pessoa.pessoa_id}</strong></td>
                        <td>${pessoa.nome}</td>
                        <td>${pessoa.cpf}</td>
                        <td>${dataFormatada}</td>
                        <td>
                            <button style="color: var(--primary); background:none; border:none; cursor:pointer; font-weight:bold">Editar</button>
                        </td>
                    </tr>
                `;
            });

        } catch (error) {
            console.error('Erro ao carregar:', error);
            corpoTabela.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red">Erro ao conectar com o banco de dados.</td></tr>';
        }
    }

    // Inicia a busca assim que a página abre
    carregarColaboradores();
</script>

</body>
</html>
