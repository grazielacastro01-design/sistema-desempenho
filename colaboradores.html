<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex min-h-screen font-sans">
    <main class="flex-1 flex flex-col">
        <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100">
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Gestão de Colaboradores</h2>
            <div class="flex items-center gap-4">
                <button onclick="abrirModalCadastro()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    <i class="fas fa-plus mr-2"></i> Novo Cadastro
                </button>
            </div>
        </header>

        <section class="p-8">
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nome</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Telefone</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'https://sistema-desempenho-production.up.railway.app';

        async function carregarColaboradores() {
            try {
                const response = await fetch(`${API_URL}/colaboradores`);
                const dados = await response.json();
                const tbody = document.getElementById('tabelaCorpo');
                tbody.innerHTML = '';
                dados.forEach(colab => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-all">
                            <td class="p-6 text-sm font-bold text-slate-400">#${colab.pessoa_id}</td>
                            <td class="p-6 text-sm font-black text-slate-800">${colab.nome}</td>
                            <td class="p-6 text-sm text-slate-500">${colab.telefone || '---'}</td>
                            <td class="p-6 text-center">
                                <button onclick="excluirColaborador(${colab.pessoa_id})" class="text-slate-400 hover:text-red-600 transition">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        }

        async function abrirModalCadastro() {
            const { value: formValues } = await Swal.fire({
                title: 'Novo Cadastro (Sprint 7)',
                html:
                    `<div class="flex flex-col gap-3 text-left">
                        <label class="text-xs font-bold text-slate-400 uppercase">Nome Completo</label>
                        <input id="swal-input1" class="swal2-input m-0 w-full" placeholder="Nome">
                        
                        <label class="text-xs font-bold text-slate-400 uppercase">Telefone</label>
                        <input id="swal-input2" class="swal2-input m-0 w-full" placeholder="(00) 00000-0000">
                        
                        <label class="text-xs font-bold text-slate-400 uppercase">Data de Nascimento</label>
                        <input id="swal-input3" type="date" class="swal2-input m-0 w-full">
                        
                        <label class="text-xs font-bold text-slate-400 uppercase">Tipo de Perfil</label>
                        <select id="swal-input4" class="swal2-input m-0 w-full">
                            <option value="1">Colaborador</option>
                            <option value="2">Gestor</option>
                        </select>
                    </div>`,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                preConfirm: () => {
                    return {
                        nome: document.getElementById('swal-input1').value,
                        telefone: document.getElementById('swal-input2').value,
                        nascimento: document.getElementById('swal-input3').value,
                        pessoa_tipo_id: document.getElementById('swal-input4').value
                    }
                }
            });

            if (formValues) {
                if (!formValues.nome || !formValues.nascimento) {
                    return Swal.fire('Erro', 'Nome e Data são obrigatórios!', 'error');
                }

                try {
                    const res = await fetch(`${API_URL}/colaborador`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formValues)
                    });
                    if (res.ok) {
                        Swal.fire('Salvo!', 'Colaborador cadastrado com sucesso.', 'success');
                        carregarColaboradores();
                    }
                } catch (e) {
                    Swal.fire('Erro', 'Falha ao conectar com o servidor.', 'error');
                }
            }
        }

        async function excluirColaborador(id) {
            const result = await Swal.fire({
                title: 'Deletar?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir'
            });

            if (result.isConfirmed) {
                const res = await fetch(`${API_URL}/colaborador/${id}`, { method: 'DELETE' });
                if (res.ok) { carregarColaboradores(); Swal.fire('Removido!', '', 'success'); }
            }
        }

        window.onload = carregarColaboradores;
    </script>
</body>
</html>
