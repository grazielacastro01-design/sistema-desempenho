<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Colaboradores | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Gerir Colaboradores</h1>
            <button onclick="window.location.href='dashboard.html'" class="text-sm font-bold text-slate-500 hover:text-slate-800">← Voltar</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-4 font-bold text-slate-600">Nome</th>
                        <th class="p-4 font-bold text-slate-600">Cargo | Área</th>
                        <th class="p-4 font-bold text-slate-600">Gestor</th>
                        <th class="p-4 font-bold text-slate-600">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarColaboradores() {
            try {
                const response = await fetch('/api/colaboradores');
                const dados = await response.json();
                const corpoTabela = document.getElementById('corpoTabela');
                
                corpoTabela.innerHTML = ''; // Limpa a tabela antes de carregar

                dados.forEach(pessoa => {
                    corpoTabela.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition">
                            <td class="p-4 text-slate-800 font-medium">${pessoa.nome}</td>
                            <td class="p-4 text-slate-600 text-sm">${pessoa.cargo} | ${pessoa.area}</td>
                            <td class="p-4 text-slate-500 text-sm">${pessoa.gestor_nome || 'Diretoria'}</td>
                            <td class="p-4 space-x-2">
                                <button class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100">PDI</button>
                                <button class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200">Editar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }
        }

        // Inicia a carga quando a página abre
        carregarColaboradores();
    </script>
</body>
</html>
