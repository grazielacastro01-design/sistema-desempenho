<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores | SD Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex min-h-screen font-sans">

    <aside class="w-72 bg-[#1e40af] text-white flex flex-col hidden lg:flex shadow-2xl">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter italic">SD PERFORMANCE</h1>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 hover:bg-white/10 rounded-xl transition-all text-blue-100">
                <i class="fas fa-th-large w-5 text-center"></i> <span>Dashboard</span>
            </a>
            <a href="colaboradores.html" class="flex items-center gap-4 p-4 bg-blue-500/30 border-l-4 border-white rounded-r-xl transition-all">
                <i class="fas fa-user-group w-5 text-center"></i> <span class="font-bold">Colaboradores</span>
            </a>
            <a href="metas.html" class="flex items-center gap-4 p-4 hover:bg-white/10 rounded-xl transition-all text-blue-100">
                <i class="fas fa-bullseye w-5 text-center"></i> <span>Metas OKR</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white p-6 flex justify-between items-center border-b border-slate-100">
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Gestão de Colaboradores</h2>
            <div class="flex items-center gap-4">
                <button onclick="gerarPDF()" class="text-slate-500 hover:text-blue-600 font-bold text-xs uppercase tracking-widest transition">
                    <i class="fas fa-file-pdf mr-1"></i> Exportar PDF
                </button>
                <button onclick="abrirModalCadastro()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    <i class="fas fa-plus mr-2"></i> Novo Cadastro
                </button>
            </div>
        </header>

        <section class="p-8 space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <i class="fas fa-search text-slate-400 ml-2"></i>
                <input type="text" id="buscaColaborador" onkeyup="filtrarTabela()" placeholder="Buscar por nome ou cargo..." class="flex-1 outline-none text-sm font-medium text-slate-600">
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nome Completo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Cargo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // Carrega a lista do servidor Railway
        async function carregarColaboradores() {
            try {
                const response = await fetch('https://sistema-desempenho-production.up.railway.app/colaboradores');
                
                // Se a resposta não for JSON (erro 404), isso evita o erro de "Unexpected token <"
                if (!response.ok) throw new Error("Erro na rota do servidor");
                
                const colaboradores = await response.json();
                const tbody = document.getElementById('tabelaCorpo');
                tbody.innerHTML = '';

                colaboradores.forEach(colab => {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-all group">
                            <td class="p-6 text-sm font-bold text-slate-400">#${colab.pessoa_id}</td>
                            <td class="p-6">
                                <p class="text-sm font-black text-slate-800">${colab.nome}</p>
                                <p class="text-[10px] text-blue-600 font-bold uppercase">Ativo</p>
                            </td>
                            <td class="p-6 text-sm font-bold text-slate-500">${colab.cargo || 'Não definido'}</td>
                            <td class="p-6 text-center">
                                <button onclick="editar(${colab.pessoa_id})" class="text-slate-400 hover:text-blue-600 transition mr-3"><i class="fas fa-edit"></i></button>
                                <button onclick="deletar(${colab.pessoa_id})" class="text-slate-400 hover:text-red-600 transition"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao listar colaboradores:", error);
            }
        }

        function filtrarTabela() {
            let input = document.getElementById("buscaColaborador").value.toUpperCase();
            let tr = document.getElementById("tabelaCorpo").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[1];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        // Função para Cadastrar enviando para o Railway
        function abrirModalCadastro() {
            Swal.fire({
                title: 'CADASTRAR NOVO COLABORADOR',
                html: `
                    <input id="swal-nome" class="swal2-input" placeholder="Nome Completo">
                    <input id="swal-cargo" class="swal2-input" placeholder="Cargo">
                `,
                confirmButtonText: 'SALVAR NO BANCO',
                showCancelButton: true,
                confirmButtonColor: '#1e40af',
                cancelButtonText: 'CANCELAR',
                preConfirm: () => {
                    const nome = document.getElementById('swal-nome').value;
                    const cargo = document.getElementById('swal-cargo').value;
                    if (!nome || !cargo) {
                        Swal.showValidationMessage('Por favor, preencha todos os campos');
                    }
                    return { nome, cargo };
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch('https://sistema-desempenho-production.up.railway.app/colaborador', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(result.value)
                        });

                        if (response.ok) {
                            Swal.fire('Sucesso!', 'Colaborador cadastrado.', 'success');
                            carregarColaboradores(); // Recarrega a tabela
                        } else {
                            throw new Error();
                        }
                    } catch (error) {
                        Swal.fire('Erro', 'Não foi possível salvar o colaborador.', 'error');
                    }
                }
            });
        }

        // Função para o botão PDF
        function gerarPDF() {
            Swal.fire({
                title: 'Relatório PDF',
                text: "A função de exportar PDF será implementada no próximo Sprint!",
                icon: 'info',
                confirmButtonColor: '#1e40af'
            });
        }

        // Inicializa a tabela
        window.onload = carregarColaboradores;
    </script>
</body>
</html>
