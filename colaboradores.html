<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Colaboradores | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); z-index: 100; items-center: center; justify-content: center; }
    .modal.active { display: flex; }
  </style>
</head>
<body class="bg-slate-50 h-full">

  <div id="modalColaborador" class="modal">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
      <h3 class="text-2xl font-bold text-slate-900 mb-6">Cadastrar Colaborador</h3>
      <form action="/api/colaboradores" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Nome Completo</label>
          <input type="text" name="nome" required class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Cargo</label>
          <input type="text" name="cargo" required class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex gap-4">
          <button type="button" onclick="fecharModal()" class="flex-1 px-4 py-2.5 border border-slate-200 text-slate-600 font-bold rounded-lg hover:bg-slate-50">Cancelar</button>
          <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="bg-white border-b border-slate-200 p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-blue-600 font-bold flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Voltar para Home
      </a>
      <h1 class="text-xl font-bold text-slate-800">Painel da Equipe</h1>
      <div class="w-24"></div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-3xl font-extrabold text-slate-900">Colaboradores</h2>
        <p class="text-slate-500">Gerencie os funcionários da unidade de Caucaia.</p>
      </div>
      <button onclick="abrirModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
        + Novo Colaborador
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="px-6 py-4 text-sm font-bold text-slate-600">Nome</th>
            <th class="px-6 py-4 text-sm font-bold text-slate-600">Cargo</th>
            <th class="px-6 py-4 text-sm font-bold text-slate-600">Departamento</th>
            <th class="px-6 py-4 text-sm font-bold text-slate-600">Status</th>
            <th class="px-6 py-4 text-sm font-bold text-slate-600 text-right">Ações</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr class="hover:bg-slate-50/50 transition">
            <td class="px-6 py-4 font-semibold text-slate-700">Graziela Oliveira</td>
            <td class="px-6 py-4 text-slate-500">Gestora de RH</td>
            <td class="px-6 py-4 text-slate-500">Administrativo</td>
            <td class="px-6 py-4">
              <span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-full font-bold">Ativo</span>
            </td>
            <td class="px-6 py-4 text-right">
              <button class="text-blue-600 font-bold hover:underline">Editar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    function abrirModal() { document.getElementById('modalColaborador').classList.add('active'); }
    function fecharModal() { document.getElementById('modalColaborador').classList.remove('active'); }
  </script>

</body>
</html>
