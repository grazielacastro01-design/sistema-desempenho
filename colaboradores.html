<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerir Colaboradores | Sistema de Desempenho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="antialiased">
    <header class="bg-[#0f172a] w-full shadow-2xl h-20 flex items-center px-6 justify-between text-white">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13.125C3 12.5037 3.50371 12 4.125 12H6.375C6.99629 12 7.5 12.5037 7.5 13.125V20.25H3V13.125ZM10.5 7.875C10.5 7.25371 11.0037 6.75 11.625 6.75H13.875C14.4963 6.75 15 7.25371 15 7.875V20.25H10.5V7.875ZM18 4.125C18 3.50371 18.5037 3 19.125 3H21.375C21.9963 3 22.5 3.50371 22.5 4.125V20.25H18V4.125Z"/></svg></div>
            <span class="text-xl font-bold uppercase text-white">Sistema de Desempenho</span>
        </div>
        <a href="dashboard.html" class="text-slate-300 hover:text-white font-bold text-sm">Voltar ao Painel</a>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900">Equipe e Talentos</h1>
            <button class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-sm shadow-xl">+ Novo Colaborador</button>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="px-10 py-7 text-slate-400 text-xs font-black uppercase tracking-widest">Colaborador</th>
                        <th class="px-10 py-7 text-slate-400 text-xs font-black uppercase tracking-widest">Cargo</th>
                        <th class="px-10 py-7 text-slate-400 text-xs font-black uppercase tracking-widest text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        window.onload = function() {
            const dados = [{id: 1, nome: "Graziela de Castro", cargo: "Analista de Sistemas", area: "Tecnologia"}];
            const corpo = document.getElementById('corpoTabela');
            dados.forEach(p => {
                corpo.innerHTML += `
                    <tr class="hover:bg-slate-50/80 transition-all">
                        <td class="px-10 py-7 font-bold text-slate-800">${p.nome}</td>
                        <td class="px-10 py-7 font-bold text-slate-700">${p.cargo} <span class="text-blue-500 text-xs block">${p.area}</span></td>
                        <td class="px-10 py-7 text-center">
                            <button onclick="location.href='perfil-colaborador.html'" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-lg">ACESSAR PDI</button>
                        </td>
                    </tr>`;
            });
        };
    </script>
</body>
</html>
