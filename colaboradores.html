<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Equipe | Sistema de Desempenho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 h-full">

  <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="dashboard.html" class="text-blue-600 font-bold flex items-center gap-2 hover:text-blue-700 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Voltar ao Painel
      </a>
      <h1 class="text-lg font-bold text-slate-800">Gestão de Colaboradores</h1>
      <div class="w-24"></div> 
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Equipe</h2>
        <p class="text-slate-500">Gerenciamento de funcionários (Tabela: tbPessoas)</p>
      </div>
      <button class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition active:scale-95">
        + Cadastrar Novo na Equipe
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ID</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Nome Completo</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">CPF</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Nascimento</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Telefone</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Ações</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <tr class="hover:bg-slate-50/50 transition">
              <td class="px-6 py-4 text-sm font-medium text-slate-400">#1</td>
              <td class="px-6 py-4 text-sm font-bold text-slate-700">Graziela Oliveira</td>
              <td class="px-6 py-4 text-sm text-slate-500">000.000.000-00</td>
              <td class="px-6 py-4 text-sm text-slate-500">01/01/2000</td>
              <td class="px-6 py-4 text-sm text-slate-500">(85) 99999-9999</td>
              <td class="px-6 py-4 text-right">
                <div class="flex justify-end gap-3">
                  <button class="text-blue-600 font-bold text-sm hover:underline">Editar</button>
                  <button class="text-rose-500 font-bold text-sm hover:underline">Excluir</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div class="p-12 text-center border-t border-slate-100">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-50 text-slate-300 rounded-full mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-2.533-4.656 9.353 9.353 0 00-4.213-.997 10.587 10.587 0 01-1.352 1.678c-.459.459-1.01.829-1.623 1.087L15 19.128zM6.75 7.354a.75.75 0 110-1.5.75.75 0 010 1.5zM4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75c0 .621-.504 1.125-1.125 1.125h-2.25A1.125 1.125 0 013 19.875v-6.75c0-.621.504-1.125 1.125-1.125z" />
          </svg>
        </div>
        <p class="text-slate-400 font-medium italic">Sua tabela tbPessoas está vazia no momento.</p>
      </div>
    </div>
  </main>

</body>
</html>
